# dataset config
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp
load_col:
    inter: [user_id, item_id, rating, timestamp]

# No val_interval — the pre-split data already handles filtering.
# No order/split in eval_args — benchmark_filename in NESCLDataset
# forces RecBole to use our pre-defined train/valid/test splits.

# model config
embedding_size: 64

# Training and evaluation config
epochs: 500
stopping_step: 30
train_batch_size: 4096
eval_batch_size: 4096
neg_sampling:
    uniform: 1

eval_args:
    group_by: user
    order: RO
    split: {'RS': [0.8, 0.1, 0.1]}
    mode: full

metrics: ['Recall', 'MRR', 'NDCG', 'Hit', 'Precision']
topk: [10, 20]
valid_metric: NDCG@20
metric_decimal_place: 4

save_dataloaders: True
seed: 2020
show_progress: False
field_separator: "\t"
